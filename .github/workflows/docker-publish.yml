name: Build Test and Publish Docker

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-test-publish:

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore Packages
      run: dotnet restore SampleApi.sln

    - name: Build Solution
      run: dotnet build SampleApi.sln --no-restore --configuration Release

    - name: Run Tests
      run: dotnet test SampleApi.sln --no-build --configuration Release

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build Docker Image
      run: |
        docker build \
          -t ghcr.io/${{ github.repository_owner }}/test_api_cicd/mywebapi:latest \
          -f Test_API_CICD/MyWebApi/Dockerfile \
          .

    - name: Push Docker Image
      run: |
        docker push ghcr.io/${{ github.repository_owner }}/Test_API_CICD/MyWebApi:latest
